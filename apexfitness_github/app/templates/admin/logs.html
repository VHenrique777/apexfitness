{% extends "base.html" %}
{% block content %}<div class="page-title"><div><span class="badge">Auditoria</span><h1>Logs do sistema</h1></div></div><table><tr><th>Data</th><th>Ator</th><th>Acao</th><th>Entidade</th><th>IP</th><th>Detalhes</th></tr>{% for l in logs %}<tr><td>{{ l.created_at }}</td><td>{{ l.actor.name if l.actor else '-' }}</td><td>{{ l.action }}</td><td>{{ l.entity }} #{{ l.entity_id }}</td><td>{{ l.ip_address }}</td><td>{{ l.details }}</td></tr>{% endfor %}</table>{% endblock %}
