{% extends "base.html" %}
{% block content %}
<div class="page-title"><div><span class="badge">Produtos</span><h1>Estoque</h1></div><a class="btn" href="{{ url_for('admin.reports', kind='estoque') }}">PDF estoque</a></div>
<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" required></div><div><label>Categoria</label><input name="category" required></div><div><label>Preco</label><input name="price" type="number" step=".01" required></div><div><label>Estoque</label><input name="stock" type="number"></div><div><label>Minimo</label><input name="minimum_stock" type="number"></div><div><label>Imagem</label><input name="image_url"></div><label><input style="width:auto" type="checkbox" name="is_active" checked> Produto ativo</label></div><label>Descricao</label><textarea name="description"></textarea><div class="toolbar"><button>Cadastrar produto</button></div></form>
<div class="compact-table" style="margin-top:18px"><table><tr><th>Editar produto</th><th>Movimento</th><th>Status</th><th>Excluir</th></tr>{% for p in products %}<tr><td><form method="post" action="{{ url_for('admin.edit_product', product_id=p.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" value="{{ p.name }}" required></div><div><label>Categoria</label><input name="category" value="{{ p.category }}" required></div><div><label>Preco</label><input name="price" type="number" step=".01" value="{{ p.price }}" required></div><div><label>Estoque</label><input name="stock" type="number" value="{{ p.stock }}"></div><div><label>Minimo</label><input name="minimum_stock" type="number" value="{{ p.minimum_stock }}"></div><div><label>Imagem</label><input name="image_url" value="{{ p.image_url or '' }}"></div></div><label>Descricao</label><textarea name="description">{{ p.description or '' }}</textarea><label><input style="width:auto" type="checkbox" name="is_active" {% if p.is_active %}checked{% endif %}> Ativo no catalogo</label><div class="toolbar"><button>Salvar edicao</button></div></form></td><td><form method="post" action="{{ url_for('admin.product_movement') }}" class="toolbar"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="product_id" value="{{ p.id }}"><select name="movement_type"><option>ENTRADA</option><option>SAIDA</option></select><input name="quantity" type="number" value="1" style="max-width:90px"><input name="unit_value" value="{{ p.price }}" style="max-width:110px"><button>Salvar</button></form></td><td>{{ 'Ativo' if p.is_active else 'Inativo' }}</td><td><form method="post" action="{{ url_for('admin.delete_product', product_id=p.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></div>
{% endblock %}
