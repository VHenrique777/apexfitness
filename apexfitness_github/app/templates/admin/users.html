{% extends "base.html" %}
{% block content %}<div class="page-title"><div><span class="badge">Usuarios</span><h1>Funcionarios</h1></div></div><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" required></div><div><label>Email</label><input name="email" type="email" required></div><div><label>Senha</label><input name="password" required></div><div><label>Cargo</label><select name="role">{% for r in roles %}<option value="{{ r.name }}">{{ r.value }}</option>{% endfor %}</select></div><div><label>CPF</label><input name="cpf"></div><div><label>Telefone</label><input name="phone"></div><div><label>RG</label><input name="rg"></div><div><label>Endereco</label><input name="address"></div></div><div class="toolbar"><button>Criar funcionario</button></div></form><table style="margin-top:18px"><tr><th>Nome</th><th>Email</th><th>Cargo</th><th>Status</th></tr>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role.value }}</td><td>{{ 'Ativo' if u.is_active else 'Inativo' }}</td></tr>{% endfor %}</table>{% endblock %}
