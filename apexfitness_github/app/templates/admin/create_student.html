{% extends "base.html" %}
{% block content %}
<div class="page-title"><div><span class="badge">Aluno</span><h1>Novo cadastro</h1></div></div>
<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid">
<div><label>Nome</label><input name="name" required></div><div><label>Sexo</label><input name="sex"></div><div><label>Idade</label><input name="age" type="number"></div><div><label>CPF</label><input name="cpf"></div><div><label>RG</label><input name="rg"></div><div><label>Telefone</label><input name="phone"></div><div><label>Email</label><input name="email" type="email" required></div><div><label>Senha</label><input name="password" type="password" required></div><div><label>Endereco</label><input name="address"></div><div><label>Plano</label><select name="plan_id">{% for p in plans %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div><div><label>Cobranca</label><select name="billing_cycle"><option value="monthly">Mensal</option><option value="quarterly">Trimestral</option><option value="annual">Anual</option></select></div></div>
<h2>Servicos adicionais</h2><div class="grid">{% for s in services %}<label><input style="width:auto" type="checkbox" name="service_ids" value="{{ s.id }}"> {{ s.name }} - R$ {{ s.price }}</label>{% endfor %}</div>
<h2>Profissionais</h2><div class="grid"><div><label>Personal</label><select name="personal_id"><option value="">Nenhum</option>{% for u in professionals if u.role.value=='PERSONAL' %}<option value="{{ u.id }}">{{ u.name }}</option>{% endfor %}</select></div><div><label>Nutricionista</label><select name="nutritionist_id"><option value="">Nenhum</option>{% for u in professionals if u.role.value=='NUTRICIONISTA' %}<option value="{{ u.id }}">{{ u.name }}</option>{% endfor %}</select></div><div><label>Fisioterapeuta</label><select name="physiotherapist_id"><option value="">Nenhum</option>{% for u in professionals if u.role.value=='FISIOTERAPEUTA' %}<option value="{{ u.id }}">{{ u.name }}</option>{% endfor %}</select></div></div><div class="toolbar"><button>Cadastrar aluno</button></div></form>
{% endblock %}
