{% extends "base.html" %}
{% block content %}
<div class="page-title"><div><span class="badge">Servicos</span><h1>Gerenciar servicos</h1></div></div>
<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" required></div><div><label>Categoria</label><input name="category" required></div><div><label>Preco</label><input name="price" type="number" step=".01" required></div><div><label>Profissional vinculado</label><select name="professional_role"><option value="">Nenhum</option>{% for role in professional_roles %}<option value="{{ role.name }}">{{ role.value }}</option>{% endfor %}</select></div><div><label>Imagem</label><input name="image_url"></div><label><input style="width:auto" type="checkbox" name="is_active" checked> Servico ativo</label></div><label>Descricao</label><textarea name="description"></textarea><div class="toolbar"><button>Cadastrar servico</button></div></form>
<div class="compact-table" style="margin-top:18px"><table><tr><th>Editar servico</th><th>Status</th><th>Excluir</th></tr>{% for s in services %}<tr><td><form method="post" action="{{ url_for('admin.edit_service', service_id=s.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" value="{{ s.name }}" required></div><div><label>Categoria</label><input name="category" value="{{ s.category }}" required></div><div><label>Preco</label><input name="price" type="number" step=".01" value="{{ s.price }}" required></div><div><label>Profissional vinculado</label><select name="professional_role"><option value="">Nenhum</option>{% for role in professional_roles %}<option value="{{ role.name }}" {% if s.professional_role == role %}selected{% endif %}>{{ role.value }}</option>{% endfor %}</select></div><div><label>Imagem</label><input name="image_url" value="{{ s.image_url or '' }}"></div></div><label>Descricao</label><textarea name="description">{{ s.description or '' }}</textarea><label><input style="width:auto" type="checkbox" name="is_active" {% if s.is_active %}checked{% endif %}> Ativo no catalogo</label><div class="toolbar"><button>Salvar edicao</button></div></form></td><td>{{ 'Ativo' if s.is_active else 'Inativo' }}</td><td><form method="post" action="{{ url_for('admin.delete_service', service_id=s.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></div>
{% endblock %}
