{% extends "base.html" %}
{% block content %}
<div class="page-title"><div><span class="badge">Planos</span><h1>Gerenciar planos</h1></div></div>
<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" required></div><div><label>Mensal</label><input name="monthly_price" type="number" step=".01" required></div><div><label>Trimestral</label><input name="quarterly_price" type="number" step=".01" required></div><div><label>Anual</label><input name="annual_price" type="number" step=".01" required></div><label><input style="width:auto" type="checkbox" name="is_active" checked> Plano ativo</label></div><label>Descricao</label><textarea name="description"></textarea><label>Beneficios</label><textarea name="benefits" placeholder="Separe os beneficios com ponto e virgula"></textarea><div class="toolbar"><button>Cadastrar plano</button></div></form>
<div class="compact-table" style="margin-top:18px"><table><tr><th>Editar plano</th><th>Status</th><th>Excluir</th></tr>{% for p in plans %}<tr><td><form method="post" action="{{ url_for('admin.edit_plan', plan_id=p.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="grid"><div><label>Nome</label><input name="name" value="{{ p.name }}" required></div><div><label>Mensal</label><input name="monthly_price" type="number" step=".01" value="{{ p.monthly_price }}" required></div><div><label>Trimestral</label><input name="quarterly_price" type="number" step=".01" value="{{ p.quarterly_price }}" required></div><div><label>Anual</label><input name="annual_price" type="number" step=".01" value="{{ p.annual_price }}" required></div></div><label>Descricao</label><textarea name="description">{{ p.description or '' }}</textarea><label>Beneficios</label><textarea name="benefits">{{ p.benefits or '' }}</textarea><label><input style="width:auto" type="checkbox" name="is_active" {% if p.is_active %}checked{% endif %}> Ativo no catalogo</label><div class="toolbar"><button>Salvar edicao</button></div></form></td><td>{{ 'Ativo' if p.is_active else 'Inativo' }}</td><td><form method="post" action="{{ url_for('admin.delete_plan', plan_id=p.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></div>
{% endblock %}
