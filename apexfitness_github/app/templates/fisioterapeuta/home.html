{% extends "base.html" %}
{% block content %}<div class="page-title"><div><span class="badge">Fisioterapeuta</span><h1>Reabilitacao</h1></div></div><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Aluno</label><select name="student_id">{% for s in students %}<option value="{{ s.id }}">{{ s.user.name }}</option>{% endfor %}</select><label>Plano de recuperacao e observacoes</label><textarea name="observations" rows="8"></textarea><div class="toolbar"><button {% if not students %}disabled{% endif %}>Gerar PDF</button>{% if not students %}<span class="badge">Vincule um aluno antes de gerar PDFs</span>{% endif %}</div></form><div class="grid" style="margin-top:18px">{% for s in students %}<article class="card"><h3>{{ s.user.name }}</h3><p>{{ s.user.phone }}</p></article>{% endfor %}</div>{% endblock %}
