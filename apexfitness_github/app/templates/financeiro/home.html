{% extends "base.html" %}
{% block content %}<div class="page-title"><div><span class="badge">Financeiro</span><h1>Dashboard financeiro</h1></div><a class="btn" href="{{ url_for('admin.reports', kind='financeiro') }}">Gerar PDF</a></div><div class="grid"><section class="card"><h3>Faturamento mensal</h3><div class="metric">R$ {{ revenue }}</div></section><section class="card"><h3>Despesas</h3><div class="metric">R$ {{ expenses }}</div></section><section class="card"><h3>Lucro liquido</h3><div class="metric">R$ {{ profit }}</div></section><section class="card"><h3>Alunos</h3><div class="metric">{{ students }}</div><p>{{ delinquent }} inadimplentes</p></section></div><section class="panel" style="margin-top:18px"><h2>Metricas em tempo real</h2><canvas id="financeChart" height="110"></canvas></section><script>new Chart(document.getElementById('financeChart'),{type:'bar',data:{labels:['Faturamento','Despesas','Lucro'],datasets:[{label:'R$',data:[{{ revenue|float }},{{ expenses|float }},{{ profit|float }}],backgroundColor:['#E31C1C','#FF6B35','#00C853']}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});</script>{% endblock %}
