{% extends "base.html" %}
{% block content %}<div class="page-title"><div><span class="badge">Personal</span><h1>Montagem de treino</h1></div><a class="btn" href="{{ url_for('professor.create_training') }}">Criar planilha</a></div><div class="grid">{% for s in students %}<article class="card"><h3>{{ s.user.name }}</h3><p>Plano: {{ s.plan.name if s.plan else '-' }}</p><p>Status: {{ s.account_status }}</p></article>{% else %}<p>Nenhum aluno vinculado.</p>{% endfor %}</div>{% endblock %}
